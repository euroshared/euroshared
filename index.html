<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroshared</title>
    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="./style.css">
    <!-- Chargement de la bibliothèque Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Euroshared</h1>
            <p id="status">Chargement...</p>
        </header>

        <!-- SECTION 1 : CONNEXION / INSCRIPTION -->
        <main class="card" id="auth-section">
            <h3>Bienvenue</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <!-- Pour l'inscription, on demande le nom -->
                <input type="text" id="reg-username" placeholder="Nom d'utilisateur">
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-password" placeholder="Mot de passe">
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="btn-login" style="background-color: #2196f3; flex: 1;">Se connecter</button>
                    <button id="btn-register" style="background-color: #28a745; flex: 1;">S'inscrire</button>
                </div>
            </div>
        </main>

        <!-- SECTION 2 : DASHBOARD (Caché par défaut) -->
        <main class="card" id="dashboard" style="display:none;">
            <div class="user-info">
                <h3>Bonjour, <span id="username">...</span></h3>
                <div class="balance-box">
                    <span class="label">Votre Solde :</span>
                    <span id="solde" class="amount">0</span> <span class="currency">MGA</span>
                </div>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                <button id="btn-gagner">💰 Gagner 10 MGA</button>
                
                <!-- HISTORIQUE -->
                <div id="historique-section" style="margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 15px; text-align: left;">
                    <h4 style="margin-bottom: 10px; color: #555;">Activités récentes :</h4>
                    <ul id="liste-transactions" style="list-style: none; padding: 0; margin: 0;">
                        <!-- JS -->
                    </ul>
                </div>

                <button id="btn-logout" style="background-color: #f44336; margin-top: 20px; font-size: 0.8rem;">Se déconnecter</button>
            </div>
        </main>
    </div>

    <!-- Lien vers votre fichier JavaScript -->
    <script src="./script.js"></script>
</body>
</html>
