<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroshared</title>
    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="./style.css">
    <!-- Chargement de la bibliothèque Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Euroshared</h1>
            <p id="status">Prêt pour l'inscription</p>
        </header>

        <!-- SECTION 1 : INSCRIPTION -->
        <main class="card" id="auth-section">
            <h3>Simulation : Inscription</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="reg-username" placeholder="Nom d'utilisateur">
                <input type="email" id="reg-email" placeholder="Email">
                <button id="btn-register" style="background-color: #28a745;">S'inscrire et commencer</button>
            </div>
        </main>

        <!-- SECTION 2 : DASHBOARD -->
        <main class="card" id="dashboard" style="display:none;">
            <div class="user-info">
                <h3>Bienvenue, <span id="username">...</span></h3>
                <div class="balance-box">
                    <span class="label">Votre Solde :</span>
                    <span id="solde" class="amount">0</span> <span class="currency">MGA</span>
                </div>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                <button id="btn-gagner">💰 Gagner 10 MGA</button>
                <button id="btn-refresh" style="background-color: #6c757d; font-size: 0.8rem; padding: 5px;">Actualiser l'historique</button>
            </div>

            <!-- HISTORIQUE (Placé à l'intérieur de la carte pour le style) -->
            <div id="historique-section" style="margin-top: 25px; border-top: 1px dashed #ccc; padding-top: 15px; text-align: left;">
                <h4 style="margin-bottom: 10px; color: #555;">Vos dernières activités :</h4>
                <ul id="liste-transactions" style="list-style: none; padding: 0; margin: 0;">
                    <!-- Les lignes de gains apparaîtront ici via le JS -->
                </ul>
            </div>
        </main>
    </div>

    <!-- Lien vers votre fichier JavaScript -->
    <script src="./script.js"></script>
</body>
</html>
