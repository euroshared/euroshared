
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroShared - Offres TimeWall</title>
    <link rel="stylesheet" href="style.css">
        <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
   <header>
        <div class="db-check">
            <div id="checker-dot" class="dot"></div>
            <span id="checker-label">Vérification...</span>
        </div>
        <div id="db-status" class="status-area">
            <span class="dot" id="status-dot"></span> 
            <span id="status-text">En attente...</span>
        </div>
   </header>

    <main>
        <div class="cote_gauche">
            <img src="./image" alt="EuroShared">
        </div>

        <div class="cote_droite">
            <!-- 1. Inscription -->
            <div id="register-container" class="container">
                <h1>Inscription</h1>
                <form id="register-form">
                    <input type="text" id="name" placeholder="Nom complet" required>
                    <input type="email" id="email" placeholder="Email" required>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Mot de passe" required minlength="6">
                        <span class="toggle-password" data-target="password">👁️</span>
                    </div>
                    <button type="submit" class="btn-primary">S'inscrire</button>
                </form>
                <p class="switch-text">Déjà membre ? <a href="#" id="to-login">Se connecter</a></p>
            </div>

            <!-- 2. Connexion -->
            <div id="login-container" class="container" style="display: none;">
                <h1>Connexion</h1>
                <form id="login-form">
                    <input type="email" id="email-login" placeholder="Email" required>
                    <div class="password-wrapper">
                        <input type="password" id="password-login" placeholder="Mot de passe" required>
                        <span class="toggle-password" data-target="password-login">👁️</span>
                    </div>
                    <button type="submit" class="btn-primary">Accéder aux offres</button>
                </form>
                <p class="switch-text"><a href="#" id="forgot-password">Mot de passe oublié ?</a></p>
                <p class="switch-text">Nouveau ? <a href="#" id="to-register">Créer un compte</a></p>
            </div>

            <!-- 3. Récupération Email -->
            <div id="forgot-password-container" class="container" style="display: none;">
                <h1>Récupération</h1>
                <input type="email" id="email-recovery-confirm" placeholder="Email" required>
                <button id="send-recovery-btn" class="btn-primary">Envoyer le lien</button>
                <p class="switch-text"><a href="#" id="back-to-login">Retour</a></p>
            </div>

            <!-- 4. Nouveau Mot de Passe -->
            <div id="new-password-container" class="container" style="display: none;">
                <h1>Nouveau mot de passe</h1>
                <div class="password-wrapper">
                    <input type="password" id="new-password-input" placeholder="Nouveau mot de passe" required minlength="6">
                    <span class="toggle-password" data-target="new-password-input">👁️</span>
                </div>
                <div class="cf-turnstile" data-sitekey="0x4AAAAAACVstQLucwQYDH5c" data-theme="dark" data-appearance="always" style="margin: 15px 0;"></div>
                <button id="save-new-password-btn" class="btn-primary">Enregistrer</button>
            </div>

            <!-- 5. Dashboard -->
            <div id="confirmation-step" class="container" style="display: none;">
                <h1>Session validée</h1>
                <p class="subtitle">Connecté : <strong id="user-email-display">...</strong></p>
                <button id="confirm-access-btn" class="btn-primary">Lancer TimeWall</button>
                <p class="switch-text"><a href="#" id="cancel-auth">Déconnexion</a></p>
            </div>
        </div>
    </main>

    <div id="timewall-container" class="full-container" style="display: none;">
        <header class="nav-bar">
            <div class="logo">EuroShared</div>
            <button id="back-to-dash" class="btn-outline">Retour</button>
            <button id="logout-button" class="btn-outline">Quitter</button>
        </header>
        <iframe id="timewall-iframe" frameborder="0"></iframe>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
