<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroShared - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="db-status" class="status-area">
        <span class="dot" id="status-dot"></span> 
        <span id="status-text">Vérification...</span>
    </div>

    <!-- Section Inscription -->
    <div id="register-container" class="container">
        <h1>Inscription</h1>
        <p class="subtitle">Rejoignez EuroShared pour gagner</p>
        <form id="register-form">
            <input type="text" id="name" placeholder="Nom complet" required>
            <input type="email" id="email" placeholder="Email" required>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Mot de passe" required minlength="6">
                <span class="toggle-password" data-target="password">👁️</span>
            </div>
            <button type="submit" class="btn-primary">S'inscrire</button>
        </form>
        <p class="switch-text">Déjà membre ? <a href="#" id="to-login">Se connecter</a></p>
    </div>

    <!-- Section Connexion -->
    <div id="login-container" class="container" style="display: none;">
        <h1>Connexion</h1>
        <form id="login-form">
            <input type="email" id="email-login" placeholder="Votre Email" required>
            <div class="password-wrapper">
                <input type="password" id="password-login" placeholder="Mot de passe" required>
                <span class="toggle-password" data-target="password-login">👁️</span>
            </div>
            <button type="submit" class="btn-primary">Accéder aux offres</button>
        </form>
        <p class="switch-text"><a href="#" id="forgot-password">Mot de passe oublié ?</a></p>
        <p class="switch-text">Nouveau ? <a href="#" id="to-register">Créer un compte</a></p>
    </div>

    <!-- Dashboard avec les 4 Menus -->
    <div id="confirmation-step" class="container" style="display: none;">
        <h1>Session validée</h1>
        <p class="subtitle">Connecté : <strong id="user-email-display">...</strong></p>

        <div class="menu-grid">
            <button id="confirm-access-btn" class="btn-primary">🚀 Lancer TimeWall</button>
            <button id="btn-lootably" class="btn-primary" style="margin-top: 10px; background: #2c3e50;">💎 Lancer Lootably</button>
            <button id="btn-cpalead" class="btn-primary" style="margin-top: 10px; background: #8e44ad;">💰 Lancer CPALead</button>
            <button id="btn-monlix" class="btn-primary" style="margin-top: 10px; background: #d35400;">🔥 Lancer Monlix</button>
        </div>

        <p class="switch-text"><a href="#" id="cancel-auth">Se déconnecter</a></p>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
