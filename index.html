<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroshared</title>
    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="./style.css">
    <!-- Chargement de la bibliothèque Supabase -->
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Mon Espace Gains</h1>
            <p id="status">Vérification de la connexion...</p>
        </header>

        <main class="card">
            <div class="user-info">
                <h3>Bienvenue, <span id="username">Chargement...</span></h3>
                <div class="balance-box">
                    <span class="label">Votre Solde :</span>
                    <span id="solde" class="amount">0</span> <span class="currency">MGA</span>
                </div>
               
                <h1>...................................</h1>
            </div>
            <button id="btn-refresh">Actualiser le solde</button>
        </main>
    </div>

     <button id="btn-gagner">Simuler un gain (10 MGA)</button>



    <!-- Formulaire de simulation d'inscription -->
<div id="auth-section" style="border: 1px solid #ccc; padding: 15px; margin-bottom: 20px;">
    <h3>Simulation : Inscription</h3>
    <input type="text" id="reg-username" placeholder="Nom d'utilisateur">
    <input type="email" id="reg-email" placeholder="Email">
    <button id="btn-register">S'inscrire et commencer</button>
</div>

<!-- Votre affichage actuel (modifié pour être dynamique) -->
<div id="dashboard" style="display:none;">
    <h2>Bienvenue, <span id="username">...</span></h2>
    <p>Votre solde : <span id="solde">0</span> MGA</p>
    <button id="btn-gagner">Gagner 10 MGA</button>
    <p id="status"></p>
</div>


    <!-- Lien vers le fichier JavaScript (à mettre à la fin) -->
    <script src="./script.js"></script>
</body>
</html>
