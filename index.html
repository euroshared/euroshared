<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test time wall</title>
     <link rel="stylesheet" href="./style.css">

</head>
<body>

<div class="container">
    <h1>Gagnez de l'argent</h1>
    <!-- Formulaire d'identification -->
    <input type="email" id="userEmail" placeholder="votre-email@exemple.com">
    <button class="btn" id="btnValider" onclick="validerEmail()">Valider mon identifiant</button>

    <!-- Menu de travail (caché au début) -->
    <div id="menuTravail" class="btn-group">
        <h3>Choisissez une tâche :</h3>
         <a href="#" id="linkSurveys" class="btn" target="_blank">📝 Sondages</a>
        <p class="info">Identifié en tant que : <span id="displayEmail"></span></p>
        <button onclick="reinitialiser()" style="background:none; border:none; color:red; cursor:pointer; text-decoration:underline;">Changer d'email</button>
    </div>
</div>

    <!-- Cette zone est cachée au début et s'affiche via afficherMenu() -->
<div id="menuTravail" style="display:none;">
    
    <!-- Bloc de bienvenue et solde -->
    <div style="background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <p>Bienvenue, <strong id="displayEmail"></strong> !</p>
        <p style="font-size: 1.2em;">
            Mon Solde : <span id="user-balance" style="color: #28a745; font-weight: bold;">chargement...</span> Points
        </p>
    </div>

    <!-- Votre bouton vers TimeWall -->
    <a id="linkSurveys" href="#" target="_blank" style="display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px;">
        Accéder aux offres TimeWall
    </a>

</div>

    

 <script src="./script.js"></script

</body>
</html>
