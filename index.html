<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroshared</title>
    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="./style.css">
    <!-- Chargement de la bibliothèque Supabase -->
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Euroshared</h1>
            <p id="status">Prêt pour l'inscription</p>
        </header>

        <!-- SECTION 1 : INSCRIPTION (Affichée au début) -->
        <main class="card" id="auth-section">
            <h3>Simulation : Inscription</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="reg-username" placeholder="Nom d'utilisateur" style="padding: 10px;">
                <input type="email" id="reg-email" placeholder="Email" style="padding: 10px;">
                <button id="btn-register" style="background-color: #28a745; color: white; padding: 10px; cursor: pointer;">S'inscrire et commencer</button>
            </div>
        </main>

        <!-- SECTION 2 : DASHBOARD (Caché au début, s'affiche après inscription) -->
        <main class="card" id="dashboard" style="display:none;">
            <div class="user-info">
                <h3>Bienvenue, <span id="username">...</span></h3>
                <div class="balance-box">
                    <span class="label">Votre Solde :</span>
                    <span id="solde" class="amount">0</span> <span class="currency">MGA</span>
                </div>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                <button id="btn-gagner" style="background-color: #007bff; color: white; padding: 10px; cursor: pointer;">
                    💰 Gagner 10 MGA
                </button>
                <button id="btn-refresh" style="padding: 5px; cursor: pointer;">Actualiser</button>
            </div>
        </main>
    </div>

    <!-- Lien vers votre fichier JavaScript -->
    <script src="./script.js"></script>
</body>
</html>
